<router-outlet />


<h1>Registro de usuario</h1>

<!-- A que grupo pertenece el formulario, QUIEN LO MANEJA? -->
<form [formGroup]="register_form" (ngSubmit)="submitRegisterForm()">
  <div>
    <label for="nombre">Ingrese su nombre:</label>
    <input type="text" formControlName="nombre" id="nombre">
  </div>
  <div>
    <label for="email">Ingrese su email:</label>
    <input type="email" formControlName="email" id="email">
  </div>
  <div>
    <label for="password">Ingrese su contraseña:</label>
    <input type="password" formControlName="password" id="password">
  </div>
  <div>
    <label for="edad">Ingrese su edad:</label>
    <input type="number" formControlName="edad" id="edad">
  </div>
  <button type="submit">Enviar</button>
</form>
